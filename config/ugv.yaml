ugv:
  # GPIO pins for L298N motor driver (BCM numbering)
  left_motor:
    in1: 17
    in2: 27
    ena: 18

  right_motor:
    in3: 22
    in4: 23
    enb: 13

  pwm_frequency_hz: 1000

  # Speed limits
  max_linear_speed_mps: 0.30
  max_angular_speed_radps: 0.50

  # Distance at which to stop and inspect a detected box (metres)
  inspect_distance_m: 0.40

  # Drop zone GPS coordinate (used for transport task)
  drop_zone_lat: 0.0
  drop_zone_lon: 0.0

  # Search pattern waypoints file (relative to project root)
  search_waypoints_file: "config/ugv_search_waypoints.txt"

  # --- Gripper (servo-based, for picking up objects) ---
  gripper:
    servo_pin: 12           # BCM pin for the gripper servo
    pwm_open: 0.1           # duty cycle for fully open
    pwm_closed: 0.8         # duty cycle for fully closed
    transit_time_s: 0.6     # seconds to wait for servo travel

# Hardware Abstraction Layer selection
hal:
  camera:
    mode: "real"  # real | mock
    source: 0
    width: 640
    height: 480
    use_picamera: true

  gps:
    mode: "real"  # real | mock | replay
    port: "/dev/ttyAMA10"
    baud: 38400

  motors:
    mode: "real"

monitoring:
  critical_components: ["camera", "gps", "motors", "mission"]
  timeout_s: 5.0
