mission:
  # Number of consecutive frames a detection must appear before acting on it
  confirm_frames: 5
  # Minimum confidence threshold to treat a detection as valid
  classify_confidence: 0.60
  # Number of QR read attempts before giving up and moving on
  qr_retry_count: 5
  # Radius (metres) within which two detections are considered the same target
  revisit_radius_m_ugv: 2.0
  revisit_radius_m_uav: 4.0

logging:
  output_dir: "logs"
  save_annotated_frames: true
  csv_filename: "targets.csv"
  json_filename: "targets.json"
  max_sessions: 5             # keep N most recent log sessions per platform

# --- FPV video streaming (replaces VNC) ---
# MJPEG over HTTP: each frame is independently decodable, works in any
# browser, and gracefully handles weak WiFi (no frozen desktop).
streaming:
  enabled: true
  port: 5000
  jpeg_quality: 50        # 1-100; lower = less bandwidth
  max_fps: 15

# --- Operator heartbeat / connection watchdog ---
# The vehicle monitors pings from the operator's browser.  On timeout
# (no ping received) the vehicle can trigger an emergency stop.
heartbeat:
  enabled: true
  port: 5001
  timeout_s: 5.0

# --- Web GUI operator panel ---
# Browser-based control panel with FPV, keyboard control, telemetry,
# mission controls, gripper/payload buttons, and target log.
web_gui:
  enabled: true
  port: 8080

# --- Foxglove Studio telemetry bridge ---
# Streams telemetry, detections, health, and camera to Foxglove Studio
# via WebSocket protocol.  Connect with: ws://<rpi-ip>:8765
foxglove:
  enabled: false              # set to true to activate
  port: 8765
  telemetry_hz: 2.0
  health_hz: 1.0
  camera_hz: 5.0

# --- Thermal management ---
# Watchdog reads CPU temperature and throttles inference when hot.
thermal:
  throttle_temp_c: 80.0       # start reducing YOLO FPS above this
  critical_temp_c: 85.0       # log critical warning above this
  throttle_skip_frames: 3     # process every Nth frame when throttled
